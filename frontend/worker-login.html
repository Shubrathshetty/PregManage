<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Worker Login - PregManage">
    <meta name="theme-color" content="#4C8BF5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Worker Login — PregManage</title>
    <!-- Design System -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Iconify Framework -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        .page-center {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        .login-logo {
            width: 72px;
            height: 72px;
            background: var(--primary);
            color: #FFFFFF;
            border-radius: var(--radius-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto var(--space-md);
            box-shadow: var(--shadow-hover);
        }
    </style>
    <link rel="stylesheet" href="/css/notifications.css">
    <script src="/js/apiClient.js"></script>
</head>
<body>
    <div class="page-center">
        <div class="login-container">
            
            <!-- Back Button -->
            <a href="/" onclick="history.back(); return false;" class="btn btn-secondary" style="width: auto; padding: 0 12px; min-height: 40px; margin-bottom: 24px; border-radius: var(--radius-full);">
                <iconify-icon icon="mdi:arrow-left"></iconify-icon> Back
            </a>

            <!-- Login Header -->
            <div class="login-header">
                <div class="login-logo">
                    <iconify-icon icon="mdi:stethoscope"></iconify-icon>
                </div>
                <h1 style="color: var(--text-primary);">Worker Portal</h1>
                <p style="color: var(--text-secondary);">Anganwadi Personnel Login</p>
            </div>

            <!-- Login Card -->
            <div class="card">
                <form id="worker-login-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group" style="margin-bottom: var(--space-lg);">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                    
                    <div id="error-message" style="display: none; margin-bottom: 16px; color: var(--error); font-size: 0.9rem; font-weight: 500; text-align: center;"></div>

                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <iconify-icon icon="mdi:lock-open-outline" style="margin-right: 8px; font-size: 1.2rem;"></iconify-icon> Access Dashboard
                    </button>
                </form>
            </div>

            <p style="margin-top: var(--space-xl); font-size: 0.8rem; color: var(--text-muted); text-align: center;">
                <iconify-icon icon="mdi:shield-check" style="vertical-align: middle;"></iconify-icon> Secure Access for Health Workers
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('worker-login-form');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Authenticating...';

            try {
                const res = await apiClient.fetch('/api/auth/worker/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/worker-dashboard.html';
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Server error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<iconify-icon icon="mdi:lock-open-outline" style="margin-right: 8px; font-size: 1.2rem;"></iconify-icon> Access Dashboard';
            }
        });
    </script>
</body>
</html>
