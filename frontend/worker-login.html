<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Worker Login - PregManage">
    <meta name="theme-color" content="#f8f7ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Worker Login — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Iconify Framework -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>
    <!-- Animated Soft Background -->
    <div class="bg-animated"></div>

    <div class="page-center">
        <div class="login-container">
            <!-- Back Button -->
            <a href="/" onclick="history.back(); return false;" class="app-back-btn" style="background: white; border-color: var(--lavender-100); color: var(--lavender-600);">
                <iconify-icon icon="mdi:arrow-left"></iconify-icon>
            </a>

            <!-- Login Header -->
            <div class="login-header fade-in">
                <div class="login-logo" style="background: var(--lavender-600); color: white; width: 64px; height: 64px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    <iconify-icon icon="mdi:doctor"></iconify-icon>
                </div>
                <h1 class="login-title" style="color: var(--lavender-900);">Worker Portal</h1>
                <p class="login-subtitle" style="color: var(--lavender-400);">Anganwadi Personnel Login</p>
            </div>

            <!-- Login Card -->
            <div class="glass-card-lavender fade-in" style="animation-delay: 100ms;">
                <form id="worker-login-form">
                    <div class="form-group">
                        <label class="form-label" for="username" style="color: var(--lavender-700);">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required
                            style="border-color: var(--lavender-100); background: white;">
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label class="form-label" for="password" style="color: var(--lavender-700);">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required
                            style="border-color: var(--lavender-100); background: white;">
                    </div>
                    
                    <div id="error-message" class="form-error text-center" style="display: none; margin-bottom: 16px; color: var(--danger); font-weight: 500;"></div>

                    <button type="submit" class="btn btn-lavender btn-full btn-lg" id="login-btn">
                        <iconify-icon icon="mdi:lock-open-outline" style="margin-right: 8px; vertical-align: middle;"></iconify-icon> Access Worker Dashboard
                    </button>
                </form>
            </div>

            <p style="margin-top: 32px; font-size: 0.75rem; color: var(--lavender-300); text-align: center;" class="fade-in">
                Secure Access for Health Workers
            </p>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const form = document.getElementById('worker-login-form');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Authenticating...';

            try {
                const res = await fetch('/api/auth/worker/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/worker-dashboard.html';
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Server error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<iconify-icon icon="mdi:lock-open-outline" style="margin-right: 8px; vertical-align: middle;"></iconify-icon> Access Worker Dashboard';
            }
        });
    </script>
</body>

</html>
