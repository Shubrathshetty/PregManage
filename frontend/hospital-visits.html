<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Hospital Visits - PregManage">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Hospital Visits — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Iconify Framework -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>
    <!-- Professional App Header (Admin Theme) -->
    <header class="app-header" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);">
        <div class="brand-logo">
            <div class="brand-icon" style="background: rgba(255,255,255,0.2); color: #FFF;">
                <iconify-icon icon="mdi:hospital-building"></iconify-icon>
            </div>
            PregManage <span style="font-size: 0.7rem; font-weight: 500; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px; margin-left: 8px;">Admin</span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="text-align: right; display: none;" id="user-info-desktop">
                <div style="font-size: 0.85rem; font-weight: 600; color: #FFFFFF;" id="user-name">Administrator</div>
                <div style="font-size: 0.7rem; color: rgba(255,255,255,0.8);">Admin Panel</div>
            </div>
            <button class="btn btn-secondary" onclick="logout()" style="min-height: 36px; padding: 0 12px; font-size: 0.8rem; border-radius: var(--radius-full); background: rgba(255,255,255,0.1); color: #FFF; border: none;">
                <iconify-icon icon="mdi:logout" style="margin-right: 4px;"></iconify-icon> Logout
            </button>
        </div>
    </header>
    <style>@media (min-width: 360px) { #user-info-desktop { display: block !important; } }</style>

    <!-- Main Content -->
    <main class="container flex-col gap-lg">
        
        <a href="/admin-dashboard.html" onclick="history.back(); return false;" class="btn btn-secondary" style="width: auto; align-self: flex-start; padding: 0 12px; min-height: 40px; border-radius: var(--radius-full);">
            <iconify-icon icon="mdi:arrow-left"></iconify-icon> Dashboard
        </a>

        <div>
            <h1 style="font-size: 1.4rem; color: var(--text-primary);">Hospital Visits</h1>
            <p style="font-size: 0.9rem; color: var(--text-secondary);">Scheduled hospital consultations for patients</p>
        </div>

        <!-- Visits List -->
        <div class="card" style="padding: 0; overflow: hidden; border: 1px solid var(--border-color);">
            <div id="visits-table-body">
                <div style="text-align: center; padding: var(--space-xl) var(--space-md);" id="visits-empty-state" class="hidden">
                    <iconify-icon icon="mdi:hospital-marker" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 12px;"></iconify-icon>
                    <h3 style="font-size: 1.1rem; color: var(--text-primary); margin-bottom: 4px;">No visits scheduled</h3>
                    <p style="font-size: 0.85rem; color: var(--text-secondary);">When workers schedule hospital visits, they will appear here.</p>
                </div>
                
                <div style="overflow-x: auto; width: 100%;">
                    <table id="visits-table" class="hidden" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: var(--bg-main); border-bottom: 2px solid var(--border-color);">
                            <tr>
                                <th style="padding: 12px 16px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">Patient</th>
                                <th style="padding: 12px 16px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">Schedule</th>
                                <th style="padding: 12px 16px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">Hospital</th>
                                <th style="padding: 12px 16px; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary);">Reported By</th>
                            </tr>
                        </thead>
                        <tbody id="visits-tbody" style="font-size: 0.9rem;"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const token = localStorage.getItem('token');

        // Auth check
        (async () => {
            if (!token) { window.location.href = '/admin-login.html'; return; }
            try {
                const res = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || data.user.role !== 'admin') {
                    localStorage.clear();
                    window.location.href = '/admin-login.html';
                    return;
                }
                document.getElementById('user-name').textContent = data.user.name;
                loadVisits();
            } catch (e) {
                localStorage.clear();
                window.location.href = '/admin-login.html';
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        async function loadVisits() {
            try {
                const res = await fetch('/api/admin/hospital-visits', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    renderVisits(data.visits);
                }
            } catch (error) {
                console.error('Failed to load visits', error);
            }
        }

        function renderVisits(visits) {
            const tbody = document.getElementById('visits-tbody');
            const table = document.getElementById('visits-table');
            const emptyState = document.getElementById('visits-empty-state');

            if (visits.length === 0) {
                table.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            table.classList.remove('hidden');

            tbody.innerHTML = visits.map(v => {
                const details = v.hospitalVisitDetails || {};
                const hDate = details.date ? new Date(details.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
                const hTime = details.time ? details.time : '';

                return `
                <tr style="border-bottom: 1px solid var(--border-color);">
                    <td style="padding: 16px;">
                        <div style="font-weight: 600; color: var(--text-primary); font-size: 0.95rem;">${v.patient ? v.patient.fullName : 'Unknown'}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; margin-top: 4px;"><iconify-icon icon="mdi:phone-outline"></iconify-icon> ${v.patient ? v.patient.phone : '—'}</div>
                    </td>
                    <td style="padding: 16px;">
                        <span style="font-size: 0.8rem; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 4px 8px; border-radius: 4px;">${hDate}</span>
                        <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 4px;"><iconify-icon icon="mdi:clock-outline"></iconify-icon> ${hTime}</div>
                    </td>
                    <td style="padding: 16px;">
                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">${details.hospitalName || '—'}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary); max-width: 150px; line-height: 1.3; margin-top: 2px;">${details.location || ''}</div>
                    </td>
                    <td style="padding: 16px;">
                        <div style="font-size: 0.9rem; color: var(--text-primary);">${v.submittedBy ? v.submittedBy.name : '—'}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">${v.submittedBy ? (v.submittedBy.area || '') : ''}</div>
                    </td>
                </tr>
            `}).join('');
        }
    </script>
</body>

</html>
