<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Worker Dashboard - PregManage">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Worker Dashboard — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Iconify Framework -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        :root {
            --app-header: var(--lavender-700);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <!-- App Status Bar -->
        <div class="app-status-bar">
            <div class="strip-saffron"></div>
            <div class="strip-white"></div>
            <div class="strip-green"></div>
        </div>

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <div class="logo-icon"><iconify-icon icon="mdi:human-pregnant"></iconify-icon></div>
                <span>PregManage</span>
            </div>
            <div class="navbar-user">
                <div class="navbar-user-info">
                    <div class="navbar-user-name" id="user-name">Worker</div>
                    <div class="navbar-user-role">Anganwadi Worker</div>
                </div>
                <button class="btn btn-ghost btn-sm" id="logout-btn" onclick="logout()">
                    <iconify-icon icon="mdi:logout" style="margin-right: 4px; vertical-align: middle;"></iconify-icon> Logout
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container dashboard-content fade-in">
            <!-- Welcome Card -->
            <div class="welcome-card" style="background: linear-gradient(135deg, var(--lavender-600) 0%, var(--lavender-800) 100%); margin-bottom: 24px; box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);">
                <div class="welcome-card-role">Anganwadi Worker</div>
                <div class="welcome-card-name">Welcome, <span id="welcome-name">Worker</span> <iconify-icon icon="mdi:hand-wave" style="vertical-align: middle;"></iconify-icon></div>
            </div>

            <!-- Section Header -->
            <div style="margin-bottom: 24px; padding-left: 4px;">
                <h2 style="font-size: 1.25rem; color: var(--lavender-900); font-weight: 800;">Patient Management</h2>
                <p style="font-size: 0.8rem; color: var(--lavender-400);">Register and assess maternal health</p>
            </div>

            <!-- Dashboard Actions -->
            <div class="flex flex-col gap-lg">
                <a href="/patient-register.html" class="card" style="display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--lavender-500); padding: 24px;">
                    <div style="font-size: 2.22rem; color: var(--lavender-600); display: flex;"><iconify-icon icon="mdi:account-plus"></iconify-icon></div>
                    <div>
                        <h3 style="font-size: 1.1rem; color: var(--lavender-900); font-weight: 700;">New Registration</h3>
                        <p style="font-size: 0.8rem; color: var(--gray-500); line-height: 1.4;">Add a new pregnant woman to the system</p>
                    </div>
                </a>

                <a href="/patient-search.html" class="card" style="display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--lavender-500); padding: 24px;">
                    <div style="font-size: 2.22rem; color: var(--lavender-600); display: flex;"><iconify-icon icon="mdi:account-search"></iconify-icon></div>
                    <div>
                        <h3 style="font-size: 1.1rem; color: var(--lavender-900); font-weight: 700;">Search Patients</h3>
                        <p style="font-size: 0.8rem; color: var(--gray-500); line-height: 1.4;">Find existing records for health assessment</p>
                    </div>
                </a>
            </div>

            <!-- Quick Info -->
            <div style="margin-top: 40px; padding: 16px; background: var(--lavender-50); border-radius: var(--radius-md); border: 1px dashed var(--lavender-200); text-align: center;">
                <p style="font-size: 0.75rem; color: var(--lavender-600); font-weight: 500;">
                    🛡️ Secure Government Portal for Maternal Health
                </p>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');

        // Auth check
        (async () => {
            if (!token) { window.location.href = '/worker-login.html'; return; }
            try {
                const res = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || data.user.role !== 'worker') {
                    localStorage.clear();
                    window.location.href = '/worker-login.html';
                    return;
                }
                const name = data.user.name || 'Worker';
                document.getElementById('user-name').textContent = name;
                document.getElementById('welcome-name').textContent = name;
            } catch (e) {
                localStorage.clear();
                window.location.href = '/worker-login.html';
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>

</html>
