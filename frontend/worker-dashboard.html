<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Worker Dashboard - PregManage">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Worker Dashboard — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Iconify Framework -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        .welcome-card-role {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        .welcome-card-name {
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Professional App Header -->
    <header class="app-header">
        <div class="brand-logo">
            <div class="brand-icon">
                <iconify-icon icon="mdi:mother-nurse"></iconify-icon>
            </div>
            PregManage
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="text-align: right; display: none;" id="user-info-desktop">
                <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-primary);" id="user-name">Worker</div>
                <div style="font-size: 0.7rem; color: var(--text-secondary);">Healthcare Worker</div>
            </div>
            <button class="btn btn-secondary" onclick="logout()" style="min-height: 36px; padding: 0 12px; font-size: 0.8rem; border-radius: var(--radius-full);">
                <iconify-icon icon="mdi:logout" style="margin-right: 4px;"></iconify-icon> Logout
            </button>
        </div>
    </header>
    <style>
        @media (min-width: 360px) { #user-info-desktop { display: block !important; } }
    </style>

    <!-- Main Content -->
    <main class="container flex-col gap-lg">
        
        <!-- Welcome Hero Card -->
        <div class="card-hero" style="margin-bottom: var(--space-md);">
            <div class="welcome-card-role">Anganwadi Worker</div>
            <div class="welcome-card-name">Welcome, <span id="welcome-name">Worker</span> <iconify-icon icon="mdi:hand-wave" style="vertical-align: middle;"></iconify-icon></div>
        </div>

        <div>
            <h2 style="font-size: 1.25rem; color: var(--text-primary); font-weight: 700;">Patient Management</h2>
            <p style="font-size: 0.85rem; color: var(--text-secondary);">Register and assess maternal health</p>
        </div>

        <!-- Dashboard Actions Grid -->
        <div class="flex-col gap-md">
            
            <a href="/patient-register.html" class="card" style="display: flex; align-items: center; gap: 20px; border-left: 4px solid var(--accent); cursor: pointer;">
                <div style="font-size: 2.2rem; color: var(--accent); background: var(--accent-light); padding: 12px; border-radius: var(--radius-full); display: flex;"><iconify-icon icon="mdi:account-plus"></iconify-icon></div>
                <div>
                    <h3 style="font-size: 1.1rem; color: var(--text-primary); font-weight: 600;">New Registration</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; margin-top: 4px;">Add a new expectant mother to the system</p>
                </div>
            </a>

            <a href="/patient-search.html" class="card" style="display: flex; align-items: center; gap: 20px; border-left: 4px solid var(--primary); cursor: pointer;">
                <div style="font-size: 2.2rem; color: var(--primary); background: var(--primary-light); padding: 12px; border-radius: var(--radius-full); display: flex;"><iconify-icon icon="mdi:account-search"></iconify-icon></div>
                <div>
                    <h3 style="font-size: 1.1rem; color: var(--text-primary); font-weight: 600;">Search Patients</h3>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; margin-top: 4px;">Find existing records for health assessment</p>
                </div>
            </a>

        </div>

        <!-- Trust Badge -->
        <div style="margin-top: var(--space-xl); padding: 16px; background: var(--bg-card); border-radius: var(--radius-card); border: 1px dashed var(--border-color); text-align: center;">
            <p style="font-size: 0.75rem; color: var(--success); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;">
                <iconify-icon icon="mdi:shield-check" style="font-size: 1.1rem;"></iconify-icon> Secure Medical Operations Portal
            </p>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');

        // Auth check
        (async () => {
            if (!token) { window.location.href = '/worker-login.html'; return; }
            try {
                const res = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || data.user.role !== 'worker') {
                    localStorage.clear();
                    window.location.href = '/worker-login.html';
                    return;
                }
                const name = data.user.name || 'Worker';
                document.getElementById('user-name').textContent = name;
                document.getElementById('welcome-name').textContent = name;
            } catch (e) {
                localStorage.clear();
                window.location.href = '/worker-login.html';
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>

</html>
