version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pregmanage-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    restart: always

# Note: This is set up to connect to your existing MongoDB Atlas.
# If you ever want to run a local database, you can add a 'mongodb' service here.
