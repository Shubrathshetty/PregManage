<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Admin Login - PregManage">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Admin Login — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="bg-animated"></div>
    <div class="page-center">
        <div class="login-container fade-in">
            <div class="glass-card-dark">
                <div class="login-header">
                    <div class="login-logo">🛡️</div>
                    <h1 class="login-title">Admin Login</h1>
                    <p class="login-subtitle">System Administrator Portal</p>
                </div>

                <form id="admin-login-form">
                    <div class="form-group">
                        <label class="form-label" for="username" style="color: rgba(255,255,255,0.7);">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required
                            autocomplete="username" style="background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: white;">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password" style="color: rgba(255,255,255,0.7);">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password"
                            required autocomplete="current-password" style="background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: white;">
                    </div>

                    <div id="error-message" class="form-error"
                        style="color: #fb7185; margin-bottom: 16px; text-align: center;"></div>

                    <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
                        Sign In
                    </button>
                </form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="/" style="color: rgba(255,255,255,0.4); font-size: 0.8rem;">← Back to home</a>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const form = document.getElementById('admin-login-form');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Signing in...';

            try {
                const res = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/admin-dashboard.html';
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Server error. Please try again.';
                errorMessage.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>

</html>
