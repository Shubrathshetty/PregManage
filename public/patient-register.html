<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="New Patient Registration - PregManage">
    <title>Patient Registration — PregManage</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="page-wrapper">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <div class="logo-icon">🤰</div>
                <span>PregManage</span>
            </div>
            <div class="navbar-user">
                <div class="navbar-user-info">
                    <div class="navbar-user-name" id="user-name">Worker</div>
                    <div class="navbar-user-role">Anganwadi Worker</div>
                </div>
                <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container dashboard-content fade-in">
            <div style="margin-bottom: 24px;">
                <a href="/worker-dashboard.html" class="btn btn-ghost" style="padding-left: 0;">← Back to Dashboard</a>
            </div>

            <div class="page-header">
                <h1 class="page-title">New Patient Registration</h1>
                <p class="page-subtitle">Register a new pregnant woman by filling in the details below</p>
            </div>

            <div class="card" style="max-width: 800px;">
                <form id="register-form">
                    <!-- Camera Capture -->
                    <div class="form-group" style="margin-bottom: 28px;">
                        <label class="form-label">Patient Photo <span class="required">*</span></label>
                        <div class="camera-container" id="camera-container">
                            <!-- Camera Feed -->
                            <div id="camera-feed-wrapper" class="camera-feed-wrapper">
                                <video id="camera-feed" autoplay playsinline></video>
                                <div id="camera-loading" class="camera-loading">
                                    <div class="spinner"></div>
                                    <p>Starting camera...</p>
                                </div>
                            </div>

                            <!-- Captured Photo Preview (hidden initially) -->
                            <div id="captured-preview-wrapper" class="camera-feed-wrapper hidden">
                                <img id="captured-preview" alt="Captured photo">
                            </div>

                            <!-- Hidden Canvas for capture -->
                            <canvas id="capture-canvas" class="hidden"></canvas>

                            <!-- Camera Controls -->
                            <div class="camera-controls">
                                <button type="button" class="btn btn-primary" id="capture-btn" onclick="capturePhoto()">
                                    📸 Capture Photo
                                </button>
                                <button type="button" class="btn btn-secondary hidden" id="retake-btn"
                                    onclick="retakePhoto()">
                                    🔄 Retake
                                </button>
                                <button type="button" class="btn btn-ghost hidden" id="switch-camera-btn"
                                    onclick="switchCamera()">
                                    🔄 Switch Camera
                                </button>
                            </div>

                            <p class="form-hint" style="text-align: center; margin-top: 8px;" id="camera-status">
                                Position the patient and click Capture
                            </p>
                        </div>
                    </div>

                    <style>
                        .camera-container {
                            border: 2px dashed var(--gray-200);
                            border-radius: var(--radius-lg);
                            padding: 16px;
                            background: var(--gray-50);
                            transition: all var(--transition-base);
                        }

                        .camera-container.has-photo {
                            border-color: var(--primary-300);
                            background: var(--primary-50);
                        }

                        .camera-feed-wrapper {
                            position: relative;
                            width: 100%;
                            max-width: 400px;
                            margin: 0 auto;
                            border-radius: var(--radius-md);
                            overflow: hidden;
                            background: #000;
                            aspect-ratio: 4/3;
                        }

                        .camera-feed-wrapper video,
                        .camera-feed-wrapper img {
                            width: 100%;
                            height: 100%;
                            object-fit: cover;
                            display: block;
                        }

                        .camera-loading {
                            position: absolute;
                            top: 0;
                            left: 0;
                            right: 0;
                            bottom: 0;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            background: rgba(0, 0, 0, 0.7);
                            color: white;
                            gap: 12px;
                        }

                        .camera-loading.hidden {
                            display: none;
                        }

                        .camera-controls {
                            display: flex;
                            justify-content: center;
                            gap: 12px;
                            margin-top: 16px;
                            flex-wrap: wrap;
                        }
                    </style>

                    <!-- Personal Info -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="fullName">Full Name <span class="required">*</span></label>
                            <input type="text" id="fullName" class="form-input" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="age">Age <span class="required">*</span></label>
                            <input type="number" id="age" class="form-input" placeholder="Age" min="14" max="55"
                                required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="husbandName">Husband's Name <span
                                    class="required">*</span></label>
                            <input type="text" id="husbandName" class="form-input" placeholder="Enter husband's name"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">Phone Number <span class="required">*</span></label>
                            <input type="tel" id="phone" class="form-input" placeholder="10-digit number"
                                pattern="[0-9]{10}" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="address">Address <span class="required">*</span></label>
                        <textarea id="address" class="form-textarea" placeholder="Enter full address"
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="aadhaar">Aadhaar Number <span class="required">*</span></label>
                        <input type="text" id="aadhaar" class="form-input" placeholder="12-digit Aadhaar number"
                            pattern="[0-9]{12}" maxlength="12" required>
                        <p class="form-hint">Enter 12-digit Aadhaar number without spaces</p>
                    </div>

                    <!-- Medical Info -->
                    <div style="border-top: 1px solid var(--gray-100); margin: 28px 0; padding-top: 28px;">
                        <h2 style="font-size: 1.125rem; margin-bottom: 20px; color: var(--gray-700);">Medical
                            Information</h2>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="lmpDate">Last Menstrual Period (LMP) <span
                                    class="required">*</span></label>
                            <input type="date" id="lmpDate" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="edd">Expected Delivery Date (EDD) <span
                                    class="required">*</span></label>
                            <input type="date" id="edd" class="form-input" required>
                            <p class="form-hint" id="edd-hint"></p>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="bloodGroup">Blood Group <span
                                    class="required">*</span></label>
                            <select id="bloodGroup" class="form-select" required>
                                <option value="">Select blood group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="gravida">Gravida (No. of Pregnancies) <span
                                    class="required">*</span></label>
                            <input type="number" id="gravida" class="form-input" placeholder="e.g., 1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="para">Para (No. of Deliveries) <span
                                    class="required">*</span></label>
                            <input type="number" id="para" class="form-input" placeholder="e.g., 0" min="0" required>
                        </div>
                    </div>

                    <div id="form-error" class="form-error" style="text-align: center; margin-bottom: 16px;"></div>

                    <button type="submit" class="btn btn-primary btn-lg btn-full" id="submit-btn">
                        Register Patient
                    </button>
                </form>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const token = localStorage.getItem('token');

        // Auth check
        (async () => {
            if (!token) { window.location.href = '/worker-login.html'; return; }
            try {
                const res = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || data.user.role !== 'worker') {
                    localStorage.clear();
                    window.location.href = '/worker-login.html';
                    return;
                }
                document.getElementById('user-name').textContent = data.user.name;
            } catch (e) {
                localStorage.clear();
                window.location.href = '/worker-login.html';
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-message">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ---- Camera Capture ----
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('capture-canvas');
        const capturedPreview = document.getElementById('captured-preview');
        const cameraFeedWrapper = document.getElementById('camera-feed-wrapper');
        const capturedPreviewWrapper = document.getElementById('captured-preview-wrapper');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const switchCameraBtn = document.getElementById('switch-camera-btn');
        const cameraLoading = document.getElementById('camera-loading');
        const cameraContainer = document.getElementById('camera-container');
        const cameraStatus = document.getElementById('camera-status');

        let currentStream = null;
        let capturedBlob = null;
        let facingMode = 'environment'; // 'user' = front, 'environment' = back

        // Start camera on page load
        async function startCamera() {
            try {
                // Stop any existing stream
                if (currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                }

                cameraLoading.classList.remove('hidden');

                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };

                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;

                video.onloadedmetadata = () => {
                    cameraLoading.classList.add('hidden');
                    // Show switch camera button if device has multiple cameras
                    navigator.mediaDevices.enumerateDevices().then(devices => {
                        const videoInputs = devices.filter(d => d.kind === 'videoinput');
                        if (videoInputs.length > 1) {
                            switchCameraBtn.classList.remove('hidden');
                        }
                    });
                };

                cameraStatus.textContent = 'Position the patient and click Capture';
            } catch (error) {
                console.error('Camera error:', error);
                cameraLoading.classList.add('hidden');
                cameraStatus.innerHTML = '⚠️ Camera access denied or not available.<br>Please allow camera permissions in your browser settings.';
                cameraStatus.style.color = 'var(--danger)';
            }
        }

        // Capture photo from video feed
        function capturePhoto() {
            if (!currentStream) {
                showToast('Camera not available', 'error');
                return;
            }

            // Set canvas size to video dimensions
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Draw current frame to canvas
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // Convert canvas to blob
            canvas.toBlob((blob) => {
                capturedBlob = blob;

                // Show preview
                capturedPreview.src = URL.createObjectURL(blob);
                cameraFeedWrapper.classList.add('hidden');
                capturedPreviewWrapper.classList.remove('hidden');

                // Toggle buttons
                captureBtn.classList.add('hidden');
                retakeBtn.classList.remove('hidden');
                switchCameraBtn.classList.add('hidden');

                // Update status
                cameraContainer.classList.add('has-photo');
                cameraStatus.textContent = '✅ Photo captured! You can retake if needed.';
                cameraStatus.style.color = 'var(--primary-700)';

                // Stop camera to save battery
                currentStream.getTracks().forEach(t => t.stop());

                showToast('Photo captured!');
            }, 'image/jpeg', 0.85);
        }

        // Retake photo
        function retakePhoto() {
            capturedBlob = null;

            // Hide preview, show camera
            capturedPreviewWrapper.classList.add('hidden');
            cameraFeedWrapper.classList.remove('hidden');

            // Toggle buttons
            captureBtn.classList.remove('hidden');
            retakeBtn.classList.add('hidden');

            // Update status
            cameraContainer.classList.remove('has-photo');
            cameraStatus.textContent = 'Position the patient and click Capture';
            cameraStatus.style.color = '';

            // Restart camera
            startCamera();
        }

        // Switch front/back camera
        function switchCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        }

        // Start camera when page loads
        startCamera();

        // Cleanup camera on page leave
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
        });

        // Auto-calculate EDD from LMP (Naegele's rule: LMP + 280 days)
        document.getElementById('lmpDate').addEventListener('change', (e) => {
            const lmp = new Date(e.target.value);
            if (!isNaN(lmp)) {
                const edd = new Date(lmp);
                edd.setDate(edd.getDate() + 280);
                document.getElementById('edd').value = edd.toISOString().split('T')[0];
                document.getElementById('edd-hint').textContent = 'Auto-calculated using Naegele\'s rule (LMP + 280 days)';
            }
        });

        // Form submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formError = document.getElementById('form-error');
            formError.style.display = 'none';

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div> Registering...';

            const formData = new FormData();
            formData.append('fullName', document.getElementById('fullName').value.trim());
            formData.append('age', document.getElementById('age').value);
            formData.append('husbandName', document.getElementById('husbandName').value.trim());
            formData.append('phone', document.getElementById('phone').value.trim());
            formData.append('address', document.getElementById('address').value.trim());
            formData.append('aadhaar', document.getElementById('aadhaar').value.trim());
            formData.append('lmpDate', document.getElementById('lmpDate').value);
            formData.append('edd', document.getElementById('edd').value);
            formData.append('bloodGroup', document.getElementById('bloodGroup').value);
            formData.append('gravida', document.getElementById('gravida').value);
            formData.append('para', document.getElementById('para').value);

            // Attach captured photo blob
            if (capturedBlob) {
                formData.append('photo', capturedBlob, 'patient-photo.jpg');
            }

            try {
                const res = await fetch('/api/patients', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const data = await res.json();

                if (data.success) {
                    showToast('Patient registered successfully! Redirecting to questionnaire...');
                    // Store patient ID and redirect to questionnaire
                    setTimeout(() => {
                        window.location.href = `/questionnaire.html?patientId=${data.patient._id}&patientName=${encodeURIComponent(data.patient.fullName)}`;
                    }, 1500);
                } else {
                    formError.textContent = data.message;
                    formError.style.display = 'block';
                    showToast(data.message, 'error');
                }
            } catch (error) {
                formError.textContent = 'Server error. Please try again.';
                formError.style.display = 'block';
                showToast('Server error', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Register Patient';
            }
        });
    </script>
</body>

</html>
